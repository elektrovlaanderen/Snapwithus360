<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#DD9A3E;
  --gold-light:#E8AA55;
  --black:#000;
  --white:#fff;
  --border:#1E1E1E;
}
html,body{height:100%;overflow:hidden}
body{background:var(--black);color:var(--white);font-family:'Outfit',sans-serif;display:flex;flex-direction:column}

/* LOGO TOP */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:10;padding:28px 5%;display:flex;justify-content:center;pointer-events:none}
.top-logo{opacity:0;animation:fadeDown .6s .2s forwards}
.top-logo img{height:32px;object-fit:contain;display:block}

/* SPLIT LAYOUT */
.split{display:grid;grid-template-columns:1fr 1fr;height:100vh;position:relative}

/* CENTER DIVIDER */
.divider{position:absolute;top:0;bottom:0;left:50%;width:1px;background:linear-gradient(to bottom,transparent,var(--gold) 20%,var(--gold) 80%,transparent);z-index:5;transform:translateX(-50%)}
.divider-logo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:6;background:var(--black);padding:20px;border-radius:50%;border:1px solid var(--border);opacity:0;animation:scalePop .5s .8s cubic-bezier(.34,1.56,.64,1) forwards}
.divider-logo img{height:40px;object-fit:contain;display:block}


/* PANELS */
.panel{position:relative;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:flex .6s cubic-bezier(.4,0,.2,1)}
.panel::before{content:'';position:absolute;inset:0;transition:opacity .4s}
.panel-be::before{background:radial-gradient(ellipse at 30% 60%,rgba(221,154,62,.12) 0%,transparent 65%)}
.panel-us::before{background:radial-gradient(ellipse at 70% 40%,rgba(221,154,62,.12) 0%,transparent 65%)}
.panel:hover{flex:1.25}
.panel:hover .panel-bg-text{opacity:.06;transform:scale(1.04)}
.panel:hover .panel-cta{opacity:1;transform:translateY(0)}
.panel:hover .panel-flag{transform:scale(1.08)}
.panel:hover .panel-inner::after{opacity:1}

/* BG TEXT */
.panel-bg-text{position:absolute;font-family:'Bebas Neue',sans-serif;font-size:clamp(120px,18vw,220px);color:var(--white);opacity:.03;letter-spacing:.04em;line-height:1;pointer-events:none;transition:opacity .4s,transform .5s;user-select:none;white-space:nowrap}
.panel-be .panel-bg-text{bottom:-20px;left:-10px}
.panel-us .panel-bg-text{top:-20px;right:-10px}

/* GRID DOTS */
.panel-dots{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(221,154,62,.1) 1px,transparent 1px);background-size:40px 40px;opacity:0;transition:opacity .4s;pointer-events:none}
.panel:hover .panel-dots{opacity:1}

/* INNER CONTENT */
.panel-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;padding:60px 40px;opacity:0;animation:fadeUp .6s forwards}
.panel-be .panel-inner{animation-delay:.4s}
.panel-us .panel-inner{animation-delay:.55s}
.panel-inner::after{content:'';position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);width:48px;height:2px;background:var(--gold);opacity:0;transition:opacity .4s}

/* FLAG */
.panel-flag{font-size:clamp(56px,8vw,88px);margin-bottom:32px;transition:transform .4s cubic-bezier(.34,1.56,.64,1);display:block;line-height:1}

/* TEXT */
.panel-country{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,5vw,64px);letter-spacing:.04em;line-height:1;margin-bottom:8px}
.panel-tagline{font-size:clamp(12px,1.2vw,14px);font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:36px}

/* CTA */
.panel-cta{display:inline-flex;align-items:center;gap:10px;background:var(--gold);color:#000;padding:13px 28px;border-radius:3px;font-weight:700;font-size:12px;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s,background .2s}
.panel-cta:hover{background:var(--gold-light)}
.panel-cta svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s}
.panel-cta:hover svg{transform:translateX(3px)}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:20px 5%;display:flex;justify-content:space-between;align-items:center;z-index:10;border-top:1px solid rgba(255,255,255,.04);opacity:0;animation:fadeUp .5s 1.1s forwards}
.bottom-url{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.25)}
.bottom-socials{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.25);text-decoration:none}
.bottom-socials svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round}

/* HOVER LINE on left panel right edge / right panel left edge */
.panel-be{border-right:none}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scalePop{from{opacity:0;transform:translate(-50%,-50%) scale(.7)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* MOBILE */
@media(max-width:680px){
  html,body{overflow:auto}
  .split{grid-template-columns:1fr;grid-template-rows:1fr 1fr;height:auto;min-height:100vh}
  .panel{min-height:50vh}
  .panel:hover{flex:1}
  .divider{top:50%;bottom:auto;left:0;right:0;width:100%;height:1px;background:linear-gradient(to right,transparent,var(--gold) 20%,var(--gold) 80%,transparent)}
  .divider-logo{top:50%;left:50%}
  .divider-or{top:calc(50% + 54px);left:50%}
  .panel-cta{opacity:1;transform:none}
  .bottom-bar{position:relative}
}
</style>
